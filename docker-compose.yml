services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - study-data:/app/backend/data
      - study-uploads:/app/uploads
      - "./CompTIA Security+ SY0-701 Exam Objectives (7.0).pdf:/app/CompTIA Security+ SY0-701 Exam Objectives (7.0).pdf:ro"
    environment:
      - PORT=3000
      - DB_PATH=/app/backend/data/study.db
      - NODE_ENV=production
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    restart: unless-stopped

volumes:
  study-data:
  study-uploads:
